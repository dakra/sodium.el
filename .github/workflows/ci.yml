name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: 'snapshot'

      - name: Install libsodium
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev pkg-config

      - name: Install package-lint
        run: |
          emacs -Q --batch --eval "(progn (require 'package) \
            (push '(\"melpa\" . \"https://melpa.org/packages/\") package-archives) \
            (package-refresh-contents) \
            (package-install 'package-lint))"

      - name: Lint
        run: make lint

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs_version: ['28.2', 'snapshot']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install libsodium (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev pkg-config

      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: brew install libsodium pkg-config

      - name: Build
        run: make

      - name: Test
        run: make test
